<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoodCut Pro - Full Edition</title>
    <!-- Подключаем библиотеки с параметром crossorigin для обхода блокировок -->
    <script src="https://unpkg.com" crossorigin></script>
    <script src="https://unpkg.com" crossorigin></script>
    <script src="https://unpkg.com"></script>
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f1f5f9; font-family: sans-serif; }
        #root { min-height: 100vh; }
        canvas { display: block; border-radius: 1rem; cursor: move; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { Trash2, Plus, Calculator, Square, Layers, Scissors, Table: TableIcon, ChevronDown, ChevronUp, Maximize2, Hash, Settings2, Box, BoxSelect, Copy } = lucide;

        // --- ПОЛНЫЙ КОД ПРИЛОЖЕНИЯ ---
        const App = () => {
            const UNITS = {
                mm: { label: 'мм', factor: 1, precision: 0 },
                cm: { label: 'см', factor: 10, precision: 1 },
                m: { label: 'м', factor: 1000, precision: 3 },
                in: { label: 'дюйм', factor: 25.4, precision: 2 }
            };

            const [unit, setUnit] = useState('mm');
            const [resawPriority, setResawPriority] = useState(true);
            const [stock, setStock] = useState([{ id: 1, length: 2000, width: 300, thickness: 40, count: 2, enabled: true }]);
            const [parts, setParts] = useState([
                { id: 1, length: 820, width: 92, thickness: 18, count: 2, enabled: true },
                { id: 2, length: 300, width: 100, thickness: 20, count: 4, enabled: true }
            ]);
            const [kerf, setKerf] = useState(3);
            const [results, setResults] = useState(null);
            const [activeTab, setActiveTab] = useState('layers');
            const [expandedBoards, setExpandedBoards] = useState({});

            const toBase = (val, currentUnit) => (parseFloat(val) || 0) * UNITS[currentUnit].factor;
            const fromBase = (val, currentUnit) => (val / UNITS[currentUnit].factor).toFixed(UNITS[currentUnit].precision);

            const updateItemValue = (setter, id, field, value) => {
                const baseValue = toBase(value, unit);
                setter(prev => prev.map(item => item.id === id ? { ...item, [field]: baseValue } : item));
            };

            const calculateLayout = () => {
                // Алгоритм раскроя
                const allParts = [];
                parts.filter(p => p.enabled).forEach(p => {
                    for(let i=0; i<p.count; i++) allParts.push({...p, instId: `${p.id}-${i}`, placed: false});
                });
                
                allParts.sort((a,b) => (b.length * b.width) - (a.length * a.width));
                
                const layouts = [];
                stock.filter(s => s.enabled).forEach((s, sIdx) => {
                    for(let i=0; i<s.count; i++) {
                        const boardRes = { ...s, boardId: `b-${s.id}-${i}`, displayIdx: i+1, allPlacedParts: [], layers: [] };
                        let spaces = [{ x: 0, y: 0, w: s.length, h: s.width }];
                        
                        allParts.forEach(p => {
                            if (p.placed) return;
                            for (let j=0; j<spaces.length; j++) {
                                let sp = spaces[j];
                                if (p.length <= sp.w && p.width <= sp.h) {
                                    let stack = resawPriority ? Math.floor((s.thickness + kerf) / (p.thickness + kerf)) : 1;
                                    let toPlace = allParts.filter(x => !x.placed && x.length === p.length && x.width === p.width).slice(0, stack);
                                    
                                    let curZ = 0;
                                    toPlace.forEach(tp => {
                                        boardRes.allPlacedParts.push({ ...tp, x: sp.x, y: sp.y, z: curZ, color: '#f59e0b' });
                                        tp.placed = true;
                                        curZ += tp.thickness + kerf;
                                    });

                                    let next = [];
                                    if (sp.w - p.length - kerf > 0) next.push({ x: sp.x + p.length + kerf, y: sp.y, w: sp.w - p.length - kerf, h: sp.h });
                                    if (sp.h - p.width - kerf > 0) next.push({ x: sp.x, y: sp.y + p.width + kerf, w: p.length, h: sp.h - p.width - kerf });
                                    spaces.splice(j, 1, ...next);
                                    return;
                                }
                            }
                        });
                        if (boardRes.allPlacedParts.length > 0) layouts.push(boardRes);
                    }
                });
                setResults({ layouts });
            };

            const ThreeDView = ({ board }) => {
                const ref = useRef();
                useEffect(() => {
                    const THREE = window.THREE;
                    const sc = new THREE.Scene(); sc.background = new THREE.Color(0xf8fafc);
                    const cam = new THREE.PerspectiveCamera(45, ref.current.clientWidth / 450, 1, 20000);
                    const ren = new THREE.WebGLRenderer({ antialias: true });
                    ren.setSize(ref.current.clientWidth, 450);
                    ref.current.appendChild(ren.domElement);
                    
                    sc.add(new THREE.AmbientLight(0xffffff, 0.8));
                    const l = new THREE.DirectionalLight(0xffffff, 0.6); l.position.set(1000, 1000, 1000); sc.add(l);
                    
                    const group = new THREE.Group();
                    const bG = new THREE.BoxGeometry(board.length, board.thickness, board.width);
                    const bM = new THREE.MeshPhongMaterial({ color: 0xe2e8f0, transparent: true, opacity: 0.3 });
                    group.add(new THREE.Mesh(bG, bM));

                    board.allPlacedParts.forEach(p => {
                        const pG = new THREE.BoxGeometry(p.length, p.thickness, p.width);
                        const pM = new THREE.Mesh(pG, new THREE.MeshPhongMaterial({ color: 0xf59e0b }));
                        pM.position.set(p.x + p.length/2 - board.length/2, p.z + p.thickness/2 - board.thickness/2, p.y + p.width/2 - board.width/2);
                        group.add(pM);
                    });
                    
                    sc.add(group);
                    cam.position.set(board.length, board.length, board.length);
                    cam.lookAt(0,0,0);
                    const anim = () => { ren.render(sc, cam); group.rotation.y += 0.002; requestAnimationFrame(anim); };
                    anim();
                    return () => { ren.dispose(); if(ref.current) ref.current.innerHTML = ''; };
                }, [board]);
                return <div ref={ref} className="w-full rounded-2xl overflow-hidden border shadow-inner bg-slate-50" />;
            };

            return (
                <div className="p-6 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
                    <div className="lg:col-span-4 space-y-4">
                        <header className="bg-white p-4 rounded-2xl shadow-sm border flex items-center gap-3">
                            <div className="bg-amber-600 p-2 rounded-xl text-white"><Calculator /></div>
                            <h1 className="text-xl font-black uppercase tracking-tight">WoodCut Pro</h1>
                        </header>
                        
                        <div className="bg-white p-5 rounded-2xl shadow-sm border space-y-4">
                            <h3 className="text-xs font-bold text-slate-400 uppercase">Настройки</h3>
                            <select value={unit} onChange={e => setUnit(e.target.value)} className="w-full p-2 border rounded-xl font-bold">
                                {Object.keys(UNITS).map(u => <option key={u} value={u}>{UNITS[u].label}</option>)}
                            </select>
                            <div>
                                <label className="text-xs text-slate-400 block mb-1">Ширина пропила ({UNITS[unit].label})</label>
                                <input type="number" value={fromBase(kerf, unit)} onChange={e => setKerf(toBase(e.target.value, unit))} className="w-full p-2 border rounded-xl" />
                            </div>
                        </div>

                        <div className="bg-white p-5 rounded-2xl shadow-sm border">
                            <h3 className="text-xs font-bold text-slate-400 uppercase mb-3">Заготовки</h3>
                            {stock.map(s => (
                                <div key={s.id} className="grid grid-cols-4 gap-2 mb-2">
                                    <input type="number" value={fromBase(s.length, unit)} onChange={e => updateItemValue(setStock, s.id, 'length', e.target.value)} className="border rounded p-1 text-center" />
                                    <input type="number" value={fromBase(s.width, unit)} onChange={e => updateItemValue(setStock, s.id, 'width', e.target.value)} className="border rounded p-1 text-center" />
                                    <input type="number" value={fromBase(s.thickness, unit)} onChange={e => updateItemValue(setStock, s.id, 'thickness', e.target.value)} className="border rounded p-1 text-center" />
                                    <input type="number" value={s.count} onChange={e => setStock(st => st.map(x => x.id === s.id ? {...x, count: +e.target.value}:x))} className="border rounded p-1 text-center bg-slate-50" />
                                </div>
                            ))}
                        </div>

                        <button onClick={calculateLayout} className="w-full py-4 bg-amber-600 text-white rounded-2xl font-black uppercase shadow-lg shadow-amber-200 hover:bg-amber-700 transition-all">Рассчитать раскрой</button>
                    </div>

                    <div className="lg:col-span-8 space-y-6">
                        {!results ? <div className="h-96 border-2 border-dashed rounded-3xl flex items-center justify-center text-slate-300 font-bold uppercase tracking-widest">Ожидание расчета...</div> : 
                        <div>
                            <div className="flex gap-2 mb-6">
                                <button onClick={()=>setActiveTab('layers')} className={`px-6 py-2 rounded-xl font-bold transition ${activeTab==='layers'?'bg-amber-600 text-white shadow-md':'bg-white text-slate-400 border'}`}>2D Слои</button>
                                <button onClick={()=>setActiveTab('3d')} className={`px-6 py-2 rounded-xl font-bold transition ${activeTab==='3d'?'bg-amber-600 text-white shadow-md':'bg-white text-slate-400 border'}`}>3D Модель</button>
                            </div>
                            {results.layouts.map(b => (
                                <div key={b.boardId} className="bg-white rounded-3xl border p-6 mb-6">
                                    <h3 className="font-bold mb-4 text-slate-700">Лист: {fromBase(b.length, unit)}x{fromBase(b.width, unit)}x{fromBase(b.thickness, unit)}</h3>
                                    {activeTab === 'layers' ? (
                                        <div className="relative border-2 border-slate-100 bg-slate-50" style={{height:'400px', width:'100%'}}>
                                            {b.allPlacedParts.map(p => (
                                                <div key={p.instId} className="absolute border border-amber-800/30 text-white flex items-center justify-center text-[10px] font-bold" 
                                                style={{left:`${p.x/b.length*100}%`, top:`${p.y/b.width*100}%`, width:`${p.length/b.length*100}%`, height:`${p.width/b.width*100}%`, backgroundColor:'#f59e0b'}}>
                                                    {p.length}x{p.width}
                                                </div>
                                            ))}
                                        </div>
                                    ) : <ThreeDView board={b} />}
                                </div>
                            ))}
                        </div>}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
