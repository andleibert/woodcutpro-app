<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoodCut Pro - Full Edition</title>
    <!-- Библиотеки -->
    <script src="https://unpkg.com" crossorigin></script>
    <script src="https://unpkg.com" crossorigin></script>
    <script src="https://unpkg.com"></script>
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f1f5f9; }
        #root { min-height: 100vh; }
        canvas { display: block; border-radius: 1rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Инструменты
        const { useState, useMemo, useEffect, useRef } = React;
        const { Trash2, Plus, Calculator, Square, Layers, Scissors, Table: TableIcon, ChevronDown, ChevronUp, Maximize2, Hash, Settings2, Box, BoxSelect, Copy } = lucide;

        // --- ВАШ КОД ИЗ PDF ---
        const App = () => {
            const UNITS = {
                mm: { label: 'мм', factor: 1, precision: 0 },
                cm: { label: 'см', factor: 10, precision: 1 },
                m: { label: 'м', factor: 1000, precision: 3 },
                in: { label: 'дюйм', factor: 25.4, precision: 2 }
            };

            const [unit, setUnit] = useState('mm');
            const [resawPriority, setResawPriority] = useState(true);
            const [stock, setStock] = useState([{ id: 1, length: 2000, width: 300, thickness: 40, count: 2, enabled: true }]);
            const [parts, setParts] = useState([
                { id: 1, length: 820, width: 92, thickness: 18, count: 2, enabled: true },
                { id: 2, length: 300, width: 100, thickness: 20, count: 4, enabled: true },
                { id: 3, length: 100, width: 100, thickness: 20, count: 4, enabled: true }
            ]);
            const [kerf, setKerf] = useState(3);
            const [results, setResults] = useState(null);
            const [activeTab, setActiveTab] = useState('layers');
            const [expandedBoards, setExpandedBoards] = useState({});
            const [highlightedId, setHighlightedId] = useState(null);

            const partColors = ['#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#ef4444', '#06b6d4', '#84cc16', '#f97316', '#6366f1'];

            const toBase = (val, currentUnit) => (parseFloat(val) || 0) * UNITS[currentUnit].factor;
            const fromBase = (val, currentUnit) => (val / UNITS[currentUnit].factor).toFixed(UNITS[currentUnit].precision);
            const format = (val) => (val / UNITS[unit].factor).toLocaleString() + ' ' + UNITS[unit].label;

            const toggleBoard = (id) => setExpandedBoards(prev => ({ ...prev, [id]: !prev[id] }));
            const addItem = (setter) => setter(prev => [...prev, { id: Date.now(), length: 0, width: 0, thickness: 0, count: 1, enabled: true }]);
            const removeItem = (setter, id) => setter(prev => prev.filter(item => item.id !== id));
            const updateItemValue = (setter, id, field, value) => {
                const baseValue = toBase(value, unit);
                setter(prev => prev.map(item => item.id === id ? { ...item, [field]: baseValue } : item));
            };

            const calculateLayout = () => {
                const activeParts = [];
                parts.filter(p => p.enabled).forEach(p => {
                    for (let i = 0; i < p.count; i++) activeParts.push({ ...p, instanceId: `${p.id}-${i}`, placed: false });
                });
                
                const sizeGroups = {};
                let colorIdx = 0;
                activeParts.forEach(p => {
                    const key = `${p.length}x${p.width}`;
                    if (!sizeGroups[key]) sizeGroups[key] = partColors[colorIdx++ % partColors.length];
                });

                activeParts.sort((a, b) => (b.length * b.width) - (a.length * a.width));
                const layouts = [];
                const activeStock = stock.filter(s => s.enabled);
                let sequence = 1;

                activeStock.forEach((s, sIdx) => {
                    for (let i = 0; i < s.count; i++) {
                        let boardRes = { ...s, boardId: `b-${s.id}-${i}`, displayIdx: i + 1, allPlacedParts: [], layers: [] };
                        let spaces = [{ x: 0, y: 0, w: s.length, h: s.width }];

                        activeParts.forEach(part => {
                            if (part.placed) return;
                            for (let j = 0; j < spaces.length; j++) {
                                let sp = spaces[j];
                                if (part.length <= sp.w && part.width <= sp.h) {
                                    let stack = resawPriority ? Math.floor((s.thickness + kerf) / (part.thickness + kerf)) : 1;
                                    let toPlace = activeParts.filter(p => !p.placed && p.length === part.length && p.width === part.width).slice(0, stack);
                                    
                                    if (toPlace.length > 0) {
                                        let curZ = 0;
                                        toPlace.forEach(p => {
                                            const placed = { ...p, x: sp.x, y: sp.y, z: curZ, actualL: p.length, actualW: p.width, color: sizeGroups[`${p.length}x${p.width}`], sequence: sequence++, stackSize: toPlace.length };
                                            boardRes.allPlacedParts.push(placed);
                                            p.placed = true;
                                            curZ += p.thickness + kerf;
                                        });
                                        let next = [];
                                        if (sp.w - part.length - kerf > 0) next.push({ x: sp.x + part.length + kerf, y: sp.y, w: sp.w - part.length - kerf, h: sp.h });
                                        if (sp.h - part.width - kerf > 0) next.push({ x: sp.x, y: sp.y + part.width + kerf, w: part.length, h: sp.h - part.width - kerf });
                                        spaces.splice(j, 1, ...next);
                                        return;
                                    }
                                }
                            }
                        });
                        const zLevels = [...new Set(boardRes.allPlacedParts.map(p => p.z))];
                        boardRes.layers = zLevels.map(z => ({ z, parts: boardRes.allPlacedParts.filter(p => p.z === z), wasteSpaces: [] }));
                        boardRes.efficiency = (boardRes.allPlacedParts.reduce((a, b) => a + (b.length * b.width * b.thickness), 0) / (s.length * s.width * s.thickness)) * 100;
                        layouts.push(boardRes);
                    }
                });
                setResults({ layouts });
                setExpandedBoards({ [layouts[0]?.boardId]: true });
            };

            const ThreeDView = ({ board }) => {
                const ref = useRef();
                useEffect(() => {
                    const THREE = window.THREE;
                    const sc = new THREE.Scene(); sc.background = new THREE.Color(0xf8fafc);
                    const cam = new THREE.PerspectiveCamera(45, ref.current.clientWidth / 450, 1, 10000);
                    const ren = new THREE.WebGLRenderer({ antialias: true });
                    ren.setSize(ref.current.clientWidth, 450);
                    ref.current.appendChild(ren.domElement);
                    sc.add(new THREE.AmbientLight(0xffffff, 0.8));
                    const l = new THREE.DirectionalLight(0xffffff, 0.5); l.position.set(1,1,1); sc.add(l);
                    const g = new THREE.Group(); sc.add(g);
                    
                    const bG = new THREE.BoxGeometry(board.length, board.thickness, board.width);
                    g.add(new THREE.Mesh(bG, new THREE.MeshPhongMaterial({ color: 0xe2e8f0, transparent: true, opacity: 0.3 })));
                    
                    board.allPlacedParts.forEach(p => {
                        const pG = new THREE.BoxGeometry(p.actualL, p.thickness, p.actualW);
                        const pM = new THREE.Mesh(pG, new THREE.MeshPhongMaterial({ color: p.color }));
                        pM.position.set(p.x + p.actualL/2 - board.length/2, p.z + p.thickness/2 - board.thickness/2, p.y + p.actualW/2 - board.width/2);
                        g.add(pM);
                    });

                    cam.position.set(board.length, board.length, board.length); cam.lookAt(0,0,0);
                    const anim = () => { ren.render(sc, cam); g.rotation.y += 0.005; requestAnimationFrame(anim); };
                    anim();
                    return () => { ren.dispose(); if(ref.current) ref.current.innerHTML = ''; };
                }, [board]);
                return <div ref={ref} className="rounded-2xl overflow-hidden border" />;
            };

            return (
                <div className="p-6 max-w-7xl mx-auto">
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-4 space-y-4">
                            <div className="bg-white p-4 rounded-2xl shadow-sm border flex items-center gap-3">
                                <div className="bg-amber-600 p-2 rounded-xl text-white"><Calculator/></div>
                                <h1 className="text-xl font-black uppercase">WoodCut Pro</h1>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border space-y-4">
                                <select value={unit} onChange={e => setUnit(e.target.value)} className="w-full p-2 border rounded-xl font-bold">
                                    {Object.keys(UNITS).map(u => <option key={u} value={u}>{UNITS[u].label}</option>)}
                                </select>
                                <button onClick={calculateLayout} className="w-full py-4 bg-amber-600 text-white rounded-2xl font-black uppercase shadow-lg">Рассчитать</button>
                            </div>
                            <div className="bg-white p-4 rounded-2xl shadow-sm border">
                                <h3 className="text-xs font-bold text-slate-400 mb-2 uppercase">Заготовки</h3>
                                {stock.map(s => <div key={s.id} className="flex gap-1 mb-1">
                                    <input type="number" value={fromBase(s.length, unit)} onChange={e => updateItemValue(setStock, s.id, 'length', e.target.value)} className="w-full border rounded p-1 text-xs"/>
                                    <input type="number" value={fromBase(s.width, unit)} onChange={e => updateItemValue(setStock, s.id, 'width', e.target.value)} className="w-full border rounded p-1 text-xs"/>
                                    <input type="number" value={s.count} onChange={e => setStock(st => st.map(x => x.id === s.id ? {...x, count: +e.target.value} : x))} className="w-12 border rounded p-1 text-xs"/>
                                </div>)}
                            </div>
                        </div>
                        <div className="lg:col-span-8">
                            {!results ? <div className="h-64 border-2 border-dashed rounded-3xl flex items-center justify-center text-slate-300 font-bold">ГОТОВ К РАБОТЕ</div> : 
                            results.layouts.map(b => (
                                <div key={b.boardId} className="bg-white rounded-3xl border mb-4 p-4 shadow-sm">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold">Лист {b.displayIdx} ({b.efficiency.toFixed(1)}%)</h3>
                                        <div className="flex gap-2">
                                            <button onClick={()=>setActiveTab('layers')} className={`px-3 py-1 rounded-lg text-xs font-bold ${activeTab==='layers'?'bg-amber-600 text-white':'bg-slate-100'}`}>2D</button>
                                            <button onClick={()=>setActiveTab('3d')} className={`px-3 py-1 rounded-lg text-xs font-bold ${activeTab==='3d'?'bg-amber-600 text-white':'bg-slate-100'}`}>3D</button>
                                        </div>
                                    </div>
                                    {activeTab === 'layers' ? b.layers.map((l, i) => (
                                        <div key={i} className="relative border-2 bg-slate-50 mb-4" style={{height:'300px', width:'100%'}}>
                                            {l.parts.map(p => (
                                                <div key={p.sequence} className="absolute border border-black/20 text-white flex items-center justify-center text-[10px] font-bold" 
                                                style={{left:`${p.x/b.length*100}%`, top:`${p.y/b.width*100}%`, width:`${p.actualL/b.length*100}%`, height:`${p.actualW/b.width*100}%`, backgroundColor:p.color}}>
                                                    #{p.sequence}
                                                </div>
                                            ))}
                                        </div>
                                    )) : <ThreeDView board={b}/>}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
